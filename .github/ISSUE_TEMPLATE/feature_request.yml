name: Feature request
description: Suggest an improvement or new capability
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do with bb-run today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: How should bb-run behave instead? Any Bitbucket Cloud docs links help.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Optional — examples, workarounds you use today, etc.
