# Upload wheels/sdists to PyPI when you publish a GitHub Release.
# Maintainer checklist: RELEASING.md in the repo root.
# One-time setup: https://docs.pypi.org/trusted-publishers/adding-a-publisher/
# (PyPI → Your project → Publishing → Add a new pending publisher → GitHub)

name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: python -m pip install --upgrade pip build

      - name: Build
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
